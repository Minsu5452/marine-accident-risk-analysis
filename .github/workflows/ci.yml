name: ci
on:
  push: {branches: [main]}
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: {python-version: "3.12"}
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy               # src·scripts 타입 체크 (pyproject files 설정)
      - run: uv run pytest -q          # 픽스처 기반 단위 테스트 (원본 데이터·네트워크 불필요)
